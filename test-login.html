<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录测试</title>
<style>
  body{padding:50px;font-family:Microsoft YaHei}
  input,button{padding:10px;margin:10px;font-size:16px}
</style>
</head>
<body>
<h1>登录测试</h1>
<input type="text" id="testInput" placeholder="输入任意内容">
<button onclick="testClick()">点击测试</button>
<p id="result"></p>

<script>
function testClick(){
  const val = document.getElementById('testInput').value;
  document.getElementById('result').textContent = '你输入了：' + val;
  alert('按钮点击成功！');
}
</script>
</body>
</html>
