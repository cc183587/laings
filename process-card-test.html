<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品工序 - 卡片少女风</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{background:#fff0f5;padding:20px;max-width:800px;margin:0 auto;min-height:100vh}
  h1{font-size:20px;text-align:left;margin:10px 0 20px;color:#333;font-weight:bold}
  
  /* 工序卡片网格 */
  .process-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  
  /* 工序卡片 */
  .process-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:6px}
  
  /* 工序名称 */
  .process-name{font-size:15px;font-weight:600;color:#333;line-height:1.3}
  
  /* 工序价格 */
  .process-price{font-size:14px;font-weight:600;color:#ff6b9d;margin-bottom:4px}
  
  /* 按钮区域 */
  .process-actions{display:flex;gap:8px}
  .btn-edit{flex:1;font-size:13px;padding:7px 0;background:#87ceeb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:500}
  .btn-del{flex:1;font-size:13px;padding:7px 0;background:#ffb6c1;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:500}
  
  /* 响应式 */
  @media(max-width:480px){
    .process-grid{grid-template-columns:repeat(2,1fr)}
    body{padding:15px}
  }
</style>
</head>
<body>
<h1>产品工序 - 卡片少女风</h1>

<div class="process-grid">
  <!-- 工序卡片1 -->
  <div class="process-card">
    <div class="process-name">贴电池</div>
    <div class="process-price">¥0.01</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
  
  <!-- 工序卡片2 -->
  <div class="process-card">
    <div class="process-name">贴喇叭</div>
    <div class="process-price">¥0.01</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
  
  <!-- 工序卡片3 -->
  <div class="process-card">
    <div class="process-name">组装</div>
    <div class="process-price">¥0.1</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
  
  <!-- 工序卡片4 -->
  <div class="process-card">
    <div class="process-name">测试</div>
    <div class="process-price">¥0.05</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
  
  <!-- 工序卡片5 -->
  <div class="process-card">
    <div class="process-name">包装</div>
    <div class="process-price">¥0.02</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
  
  <!-- 工序卡片6 -->
  <div class="process-card">
    <div class="process-name">质检</div>
    <div class="process-price">¥0.03</div>
    <div class="process-actions">
      <button class="btn-edit">编辑</button>
      <button class="btn-del">删除</button>
    </div>
  </div>
</div>

</body>
</html>
