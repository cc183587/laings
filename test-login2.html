<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调试</title>
</head>
<body>
<h1>直接复制 index.html 的登录部分测试</h1>

<div id="loginPage">
  <h1>🐱 每日产量登记</h1>
  <div class="box">
    <input type="text" id="loginInput" placeholder="请输入工号">
    <button class="btn" onclick="unifiedLogin()">登录</button>
  </div>
</div>

<script>
function unifiedLogin(){
  console.log('unifiedLogin 被调用了！');
  const val = document.getElementById('loginInput').value.trim();
  console.log('输入的值：', val);
  alert('点击成功！你输入了：' + val);
}
</script>
</body>
