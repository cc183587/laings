<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简单测试</title>
</head>
<body>
<input type="text" id="testInput" placeholder="输入内容">
<button onclick="testFunc()">点击测试</button>
<div id="result"></div>

<script>
function testFunc(){
  const val = document.getElementById('testInput').value;
  document.getElementById('result').textContent = '结果：' + val;
  console.log('函数被调用了，值：', val);
}
</script>
</body>
</html>
